global:
  scrape_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093
rule_files:
  - "alerts.yml"

scrape_configs:

  - job_name: 'k8s-nodes'
    static_configs:
      - targets:
          - 10.10.20.20:9100
          - 10.10.20.21:9100
          - 10.10.20.24:9100

  - job_name: 'kube-state-metrics'
    static_configs:
      - targets:
          - 10.10.20.20:31349

  - job_name: 'kubelet'
    metrics_path: /metrics/cadvisor
    scheme: http
    static_configs:
      - targets:
          - 10.10.20.20:10255
          - 10.10.20.21:10255
          - 10.10.20.24:10255
